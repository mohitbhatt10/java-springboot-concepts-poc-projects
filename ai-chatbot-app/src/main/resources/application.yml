spring:
  application:
    name: ai-chatbot-app
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:ai_chatbot}?currentSchema=public
    username: ${DB_USERNAME:appuser}
    password: ${DB_PASSWORD:StrongP@ssw0rd}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Kolkata'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email

server:
  port: 8084

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash
    timeout-seconds: 30

logging:
  level:
    root: INFO
    "[com.example.aichatbot]": DEBUG
    "[org.springframework.web]": INFO
