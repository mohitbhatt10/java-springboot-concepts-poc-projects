<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reactive Order Tracker</title>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/tailwind.css">
    <script src="/js/theme-toggle.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">
<div class="max-w-3xl mx-auto px-6 py-12">
    <header class="flex items-center justify-between mb-10">
        <div>
            <h1 class="text-3xl font-semibold">Reactive Order Tracker</h1>
            <p class="text-gray-600 dark:text-gray-400">Create an order and watch it move through a live reactive stream.</p>
        </div>
        <button id="theme-toggle" class="px-3 py-2 rounded border border-gray-300 dark:border-gray-700 text-sm hover:bg-gray-100 dark:hover:bg-gray-800" type="button">Toggle Theme</button>
    </header>

    <section class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
        <h2 class="text-xl font-semibold mb-4">Create Order</h2>
        <form id="order-form" class="space-y-4">
            <div>
                <label for="description" class="block text-sm font-medium mb-1">Description</label>
                <input id="description" name="description" type="text" required class="w-full rounded border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-3 py-2 focus:ring-2 focus:ring-sky-500" placeholder="e.g., Wireless headphones" />
            </div>
            <div class="flex items-center gap-3">
                <button type="submit" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded shadow">Submit</button>
                <span id="status" class="text-sm text-gray-600 dark:text-gray-400"></span>
            </div>
        </form>
    </section>

    <section id="result" class="mt-8 hidden bg-white dark:bg-gray-800 shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-2">Order Created</h3>
        <p class="text-gray-700 dark:text-gray-300">Order ID: <span id="order-id" class="font-mono"></span></p>
        <div class="mt-4 flex gap-3">
            <a id="track-link" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow" href="#">Go to Live Tracking</a>
        </div>
    </section>
</div>

<script>
    const form = document.getElementById('order-form');
    const statusEl = document.getElementById('status');
    const result = document.getElementById('result');
    const orderIdEl = document.getElementById('order-id');
    const trackLink = document.getElementById('track-link');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        statusEl.textContent = 'Submitting...';

        const payload = { description: form.description.value };

        const response = await fetch('/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            statusEl.textContent = 'Failed to create order';
            return;
        }

        const order = await response.json();
        orderIdEl.textContent = order.id;
        trackLink.href = `/orders/view?id=${order.id}`;
        statusEl.textContent = 'Order created!';
        result.classList.remove('hidden');
    });
</script>
</body>
</html>
