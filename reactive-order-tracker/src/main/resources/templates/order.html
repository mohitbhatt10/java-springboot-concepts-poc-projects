<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/tailwind.css">
    <script src="/js/theme-toggle.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">
<div class="max-w-4xl mx-auto px-6 py-12">
    <header class="flex items-center justify-between mb-10">
        <div>
            <h1 class="text-3xl font-semibold">Live Order Tracking</h1>
            <p class="text-gray-600 dark:text-gray-400">Order <span class="font-mono" id="order-id">[[${orderId}]]</span></p>
        </div>
        <div class="flex gap-3">
            <a href="/" class="px-3 py-2 rounded border border-gray-300 dark:border-gray-700 text-sm hover:bg-gray-100 dark:hover:bg-gray-800">Back</a>
            <button id="theme-toggle" class="px-3 py-2 rounded border border-gray-300 dark:border-gray-700 text-sm hover:bg-gray-100 dark:hover:bg-gray-800" type="button">Toggle Theme</button>
        </div>
    </header>

    <section class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold">Stream</h2>
            <span id="stream-status" class="text-sm text-amber-600">Connecting...</span>
        </div>
        <div id="events" class="space-y-3 text-sm"></div>
    </section>
</div>

<script>
    const orderId = document.getElementById('order-id').textContent;
    const eventsContainer = document.getElementById('events');
    const streamStatus = document.getElementById('stream-status');

    function renderEvent(event) {
        const card = document.createElement('div');
        const isError = event.error === true;
        card.className = `rounded border px-4 py-3 ${isError ? 'border-red-500 bg-red-50 dark:bg-red-900/30' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900'}`;
        card.innerHTML = `
            <div class="flex items-center justify-between mb-1">
                <div class="font-semibold ${isError ? 'text-red-600 dark:text-red-300' : 'text-emerald-600 dark:text-emerald-300'}">${event.status || 'ERROR'}</div>
                <div class="text-xs text-gray-500 dark:text-gray-400">${event.timestamp || 'n/a'}</div>
            </div>
            <p class="text-gray-700 dark:text-gray-200">${event.message || ''}</p>
        `;
        eventsContainer.prepend(card);
    }

    function startStream() {
        const source = new EventSource(`/orders/${orderId}/track`);
        let completed = false;

        source.onopen = () => {
            streamStatus.textContent = 'Streaming';
            streamStatus.className = 'text-sm text-emerald-600';
        };

        // Fallback for unnamed events
        source.onmessage = (message) => {
            if (!message.data) return;
            const payload = JSON.parse(message.data);
            renderEvent(payload);
        };

        source.addEventListener('status', (message) => {
            if (!message.data) return;
            const payload = JSON.parse(message.data);
            renderEvent(payload);
        });

        source.addEventListener('stream-error', (message) => {
            streamStatus.textContent = 'Stream error';
            streamStatus.className = 'text-sm text-red-600';
            if (message.data) {
                renderEvent(JSON.parse(message.data));
            }
        });

        source.addEventListener('complete', () => {
            completed = true;
            streamStatus.textContent = 'Completed';
            streamStatus.className = 'text-sm text-gray-500';
            source.close();
        });

        source.addEventListener('ping', () => {
            // keep-alive, no UI change needed
        });

        source.onerror = function (ev) {
            if (completed) {
                return; // natural close after completion
            }
            try {
                if (this.readyState === EventSource.CLOSED) {
                    streamStatus.textContent = 'Stream ended (server closed connection)';
                    streamStatus.className = 'text-sm text-gray-500';
                } else {
                    streamStatus.textContent = 'Connection lost, retrying...';
                    streamStatus.className = 'text-sm text-amber-600';
                }
            } catch (e) {
                console.warn('onerror handler safe-guard:', e);
            }
            finally {
                source.close();
            }
        };
    }

    document.addEventListener('DOMContentLoaded', startStream);
</script>
</body>
</html>
